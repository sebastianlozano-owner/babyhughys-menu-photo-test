const params = new URLSearchParams(location.search);
const V = (params.get('v') || 'before').toLowerCase();   // before | after | compare
const money = n => n==null ? '' : '$' + n.toFixed(2);

// category nav
const cats = document.getElementById('cats');
MENU.categories.forEach((c,i)=>{ const a=document.createElement('a'); a.textContent=c.name; a.href='#cat'+i; cats.appendChild(a); });

const root = document.getElementById('menu');
MENU.categories.forEach((c,i)=>{
  const h=document.createElement('h2'); h.className='cat'; h.id='cat'+i; h.textContent=c.name; root.appendChild(h);
  c.items.forEach(it=>{
    const row=document.createElement('div'); row.className='item';
    if(V==='compare' && it.hasPair){
      row.innerHTML = `<div class="body"><h3>${it.name}${it.popular?'<span class="pop">Popular</span>':''}</h3>
        ${it.description?'<p>'+it.description+'</p>':''}<div class="price">${money(it.price)}</div>
        <div class="cmp"><figure><img loading="lazy" src="${it.before}"><figcaption>Option 1</figcaption></figure>
        <figure><img loading="lazy" src="${it.after}"><figcaption>Option 2</figcaption></figure></div></div>`;
    } else {
      const img = V==='after' ? (it.after||it.before) : it.before;
      const thumb = img ? `<img class="thumb" loading="lazy" src="${img}" alt="${it.name}">` : '<div class="noimg"></div>';
      row.innerHTML = `<div class="body"><h3>${it.name}${it.popular?'<span class="pop">Popular</span>':''}</h3>
        ${it.description?'<p>'+it.description+'</p>':''}<div class="price">${money(it.price)} <button class="add">+</button></div></div>${thumb}`;
    }
    root.appendChild(row);
  });
});

// In compare mode, show a neutral helper bar. before/after stay unlabeled on purpose.
if(V==='compare'){ const b=document.getElementById('modebar'); b.style.display='block'; b.textContent='For each dish, two photo options are shown.'; }
