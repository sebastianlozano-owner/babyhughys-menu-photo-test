<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Baby Hughy's Restaurant — Order Online</title>
<style>
  :root{--brand:rgb(255 200 26);--brand-dark:rgb(224 176 22);--on-brand:rgb(51 39 0);--bg:rgb(13 13 13);--surface:rgb(31 31 31);--surface2:rgb(46 46 46);--divider:rgb(77 77 77);--ink:rgb(255 255 255);--ink2:rgb(214 214 214);--maxw:1180px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:84px}
  a{color:inherit;text-decoration:none} img{display:block} button{font:inherit;cursor:pointer}
  .wrap{max-width:var(--maxw);margin:0 auto}

  /* header (scrolls away — NOT sticky, so the subnav can pin) */
  header.top{padding:14px 16px 10px}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo{width:40px;height:40px;border-radius:10px;object-fit:cover;background:var(--surface);flex:none}
  .signin{font-size:13px;font-weight:600;border:1px solid var(--divider);border-radius:999px;padding:7px 14px;background:transparent;color:var(--ink)}
  .brandblock{text-align:center;margin:8px 0 12px}
  .bname{font-size:19px;font-weight:700;line-height:1.2}
  .meta{color:var(--ink2);font-size:12.5px;margin-top:3px;display:flex;align-items:center;justify-content:center;gap:5px}
  .meta .open{color:var(--brand)}
  /* full-width Pickup/Delivery segmented control */
  .fulfil{display:flex;border:1px solid var(--divider);border-radius:12px;padding:3px;gap:3px}
  .fulfil button{flex:1;border:0;background:transparent;color:var(--ink2);padding:10px 0;border-radius:9px;font-weight:600;text-align:center}
  .fulfil .on{background:var(--surface2);color:var(--ink)}
  /* location + time dropdown pills */
  .locrow{display:flex;gap:8px;margin-top:8px}
  .locpill{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:6px;border:1px solid var(--divider);border-radius:999px;padding:9px 14px;background:transparent;color:var(--ink);font-size:13px;font-weight:600}
  .locpill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .locpill .car{opacity:.7;flex:none}

  /* sticky subnav: search icon + category pills (pins on scroll) */
  .subnav{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid rgb(77 77 77/.5);padding:8px 12px;display:flex;align-items:center;gap:8px}
  .searchicon{width:40px;height:40px;flex:none;border:1px solid var(--divider);border-radius:999px;background:transparent;display:flex;align-items:center;justify-content:center}
  .pills{flex:1;min-width:0;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pills a{display:inline-block;margin-right:8px;padding:9px 14px;border:1px solid var(--divider);border-radius:999px;background:transparent;color:var(--ink2);font-size:13px;font-weight:600}
  .pills a.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .subnav .searchbox{display:none;flex:1;align-items:center;gap:8px}
  .subnav.searching .pills{display:none}
  .subnav.searching .searchicon{display:none}
  .subnav.searching .searchbox{display:flex}
  .subnav .cancel{flex:none;background:transparent;border:0;color:var(--ink2);font-weight:600;padding:0 4px}
  .search{display:flex;align-items:center;gap:8px;height:40px;border:1px solid var(--divider);border-radius:10px;padding:0 12px;background:transparent;flex:1;min-width:0}
  .search:focus-within{border-color:var(--ink)}
  .search svg{flex:none;opacity:.85}
  .search input{flex:1;min-width:0;border:0;background:transparent;color:var(--ink);font:inherit;outline:none}
  .search input::placeholder{color:var(--ink2);opacity:.85}

  .shell{display:block} aside.rail{display:none}
  main{padding:6px 16px 24px}
  .modebar{background:rgb(255 200 26/.12);color:var(--brand);font-size:12px;padding:7px 12px;text-align:center;border-radius:10px;margin:8px 0}

  .sec-h{font-size:20px;font-weight:700;margin:18px 2px 10px}
  .scroller{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none}.scroller::-webkit-scrollbar{display:none}
  .pcard{flex:none;width:152px;background:var(--surface);border-radius:14px;overflow:hidden;text-align:left;border:0;color:inherit;padding:0}
  .pcard .pimgw{position:relative;background:repeating-conic-gradient(#1c1c1c 0% 25%, #161616 0% 50%) 0/22px 22px}
  .pcard .pimg{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
  .pcard .padd{position:absolute;right:8px;bottom:8px;width:28px;height:28px;border-radius:50%;border:1px solid var(--divider);background:rgb(13 13 13/.85);color:var(--ink);font-size:17px;line-height:24px;text-align:center;padding:0}
  .pcard .pmeta{padding:9px 10px 11px}
  .pcard .pname{font-size:13.5px;font-weight:600;line-height:1.25;height:34px;overflow:hidden}
  .pcard .pprice{font-size:13px;color:var(--ink2);margin-top:3px}

  .cat{font-size:21px;font-weight:700;margin:26px 2px 6px;scroll-margin-top:64px}
  .items{display:flex;flex-direction:column}
  .item{display:flex;gap:14px;padding:14px 2px;border-bottom:1px solid rgb(77 77 77/.5);align-items:stretch;background:none;border-left:0;border-right:0;border-top:0;width:100%;text-align:left;color:inherit}
  .item .b{flex:1;min-width:0;display:flex;flex-direction:column}
  .item h3{margin:0;font-size:15.5px;font-weight:600;line-height:1.25}
  .item .price{font-size:14px;margin:5px 0 6px}
  .item .desc{margin:0;color:var(--ink2);font-size:12.5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .pop{display:inline-block;font-size:10.5px;font-weight:700;color:var(--on-brand);background:var(--brand);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  .imgwrap{position:relative;flex:none;align-self:center}
  .thumb{width:104px;height:104px;border-radius:12px;object-fit:cover;background:#222;display:block}
  .noimg{width:104px;height:104px;border-radius:12px;background:#1d1d1d}
  .add{position:absolute;right:7px;bottom:7px;width:30px;height:30px;border-radius:50%;border:1px solid var(--divider);background:rgb(13 13 13/.85);color:var(--ink);font-size:18px;line-height:26px;text-align:center;padding:0}

  .cmp{display:flex;gap:8px;margin-top:8px}.cmp figure{margin:0;flex:1;text-align:center}.cmp img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;background:#222}.cmp figcaption{font-size:12px;color:var(--ink2);margin-top:5px}

  .cta{position:fixed;left:0;right:0;bottom:0;z-index:25;background:linear-gradient(to top,var(--bg) 70%,transparent);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .cta button{width:100%;max-width:var(--maxw);margin:0 auto;display:block;background:var(--brand);color:var(--on-brand);border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:700}

  .modal{position:fixed;inset:0;z-index:60;display:none}.modal.open{display:block}
  .modal .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
  .modal .sheet{position:absolute;left:0;right:0;bottom:0;top:0;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
  .modal .close{position:fixed;top:12px;right:12px;z-index:2;width:38px;height:38px;border-radius:50%;border:0;background:rgba(0,0,0,.55);color:#fff;font-size:20px}
  .modal .hero{width:100%;aspect-ratio:1/1;object-fit:cover;background:#222;flex:none}
  .modal .mc{padding:18px 18px 120px}
  .modal .mname{font-size:22px;font-weight:700;margin:0 0 6px;color:var(--ink)}
  .modal .mprice{font-size:16px;color:var(--ink);margin:0 0 10px}
  .modal .mdesc{color:var(--ink2);font-size:14px;line-height:1.5;margin:0}
  .modal .mfoot{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid rgb(77 77 77/.5);padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;gap:12px;align-items:center}
  .qty{display:flex;align-items:center;gap:14px;border:1px solid var(--divider);border-radius:999px;padding:6px 10px}.qty button{border:0;background:transparent;color:var(--ink);font-size:20px;width:24px}.qty span{min-width:16px;text-align:center;font-weight:600}
  .addcart{flex:1;background:var(--brand);color:var(--on-brand);border:0;border-radius:13px;padding:15px;font-size:15px;font-weight:700}

  @media (min-width:768px){
    body{padding-bottom:24px}
    .subnav{display:none}
    .brandblock{text-align:left} .fulfil{max-width:320px} .locrow{max-width:480px}
    .shell{display:grid;grid-template-columns:248px 1fr;gap:28px;max-width:var(--maxw);margin:0 auto;padding:0 16px}
    aside.rail{display:block;position:sticky;top:14px;align-self:start;padding-top:8px}
    aside.rail .railnav{margin-top:12px}
    aside.rail a{display:block;padding:9px 12px;border-radius:9px;color:var(--ink2);font-size:14px;font-weight:600;margin-bottom:2px}
    aside.rail a.active{background:var(--surface);color:var(--ink)}
    main{padding:6px 0 40px}
    .items{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
    .cta{display:none}.pcard{width:170px}
    .modal .sheet{top:5vh;bottom:5vh;left:50%;transform:translateX(-50%);width:520px;max-width:92vw;border-radius:18px;overflow:hidden}
    .modal .close{position:absolute}.modal .mfoot{position:absolute}.modal .hero{aspect-ratio:16/11}
  }
</style></head>

// modal
let curItem=null,qty=1;
function openModal(it){ curItem=it; qty=1; const img=photo(it);
  const hero=document.getElementById('mhero'); hero.src=img||''; hero.style.display=img?'block':'none';
  document.getElementById('mname').textContent=it.name; document.getElementById('mprice').textContent=money(it.price); document.getElementById('mdesc').textContent=it.description||'';
  document.getElementById('qval').textContent='1'; updateCart();
  const m=document.getElementById('modal'); m.classList.add('open'); m.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
function closeModal(){ const m=document.getElementById('modal'); m.classList.remove('open'); m.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
function updateCart(){ const p=curItem&&curItem.price!=null?curItem.price*qty:null; document.getElementById('addcart').textContent='Add to cart'+(p!=null?' · '+money(p):''); }
document.querySelectorAll('[data-close]').forEach(el=>el.onclick=closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();exitSearch();}});
document.getElementById('qminus').onclick=()=>{qty=Math.max(1,qty-1);document.getElementById('qval').textContent=qty;updateCart();};
document.getElementById('qplus').onclick=()=>{qty++;document.getElementById('qval').textContent=qty;updateCart();};

function doFilter(q){ q=(q||'').trim().toLowerCase();
  document.querySelectorAll('.items .item').forEach(row=>{ row.style.display=(!q||row.dataset.name.includes(q))?'':'none'; });
  document.querySelectorAll('.cat').forEach(h=>{ const list=h.nextElementSibling; const any=[...list.querySelectorAll('.item')].some(r=>r.style.display!=='none'); h.style.display=any?'':'none'; }); }
const subnav=document.getElementById('subnav'), msearch=document.getElementById('msearch-input');
document.getElementById('searchToggle').onclick=()=>{ subnav.classList.add('searching'); msearch.focus(); };
function exitSearch(){ subnav.classList.remove('searching'); if(msearch){msearch.value='';} doFilter(''); }
document.getElementById('searchCancel').onclick=exitSearch;
['msearch-input','rail-search-input'].forEach(id=>{const el=document.getElementById(id); if(el)el.addEventListener('input',()=>doFilter(el.value));});

// scroll-spy
const spy=new IntersectionObserver(es=>{es.forEach(e=>{ if(e.isIntersecting){ const id=e.target.id; document.querySelectorAll('[data-cat]').forEach(a=>a.classList.toggle('active',a.dataset.cat===id)); } });},{rootMargin:'-45% 0px -50% 0px'});
const popH=document.getElementById('cat-pop'); if(popH)spy.observe(popH);
document.querySelectorAll('.cat').forEach(h=>spy.observe(h));

document.getElementById('ctaBtn').onclick=()=>{ if(carItems[0])openModal(carItems[0]); };
if(V==='compare'){ document.getElementById('modebar').textContent='For each dish, two photo options are shown.'; }
</script>
</body></html>
